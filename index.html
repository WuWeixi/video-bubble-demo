<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breathing Aurora</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #02050d;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      overflow: hidden;
      isolation: isolate;
      --pointer-x: 50vw;
      --pointer-y: 50vh;
      --pointer-alpha: 0;
      background:
        radial-gradient(ellipse at 22% 22%, rgba(22, 114, 204, 0.28), transparent 42%),
        radial-gradient(ellipse at 78% 24%, rgba(102, 58, 210, 0.22), transparent 38%),
        radial-gradient(ellipse at 54% 88%, rgba(199, 28, 72, 0.2), transparent 44%),
        radial-gradient(ellipse at 50% 45%, rgba(12, 35, 76, 0.42), transparent 48%),
        linear-gradient(132deg, #02050d 0%, #061126 38%, #030715 68%, #010307 100%);
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      inset: -24%;
      z-index: -2;
      pointer-events: none;
      will-change: transform, opacity, filter;
    }

    .scene::before {
      background:
        radial-gradient(ellipse at 16% 30%, rgba(36, 145, 255, 0.62), transparent 36%),
        radial-gradient(ellipse at 80% 30%, rgba(129, 73, 255, 0.56), transparent 34%),
        radial-gradient(ellipse at 48% 14%, rgba(0, 232, 214, 0.22), transparent 32%),
        radial-gradient(ellipse at 58% 78%, rgba(236, 35, 105, 0.46), transparent 39%),
        radial-gradient(ellipse at 88% 76%, rgba(255, 86, 42, 0.22), transparent 34%),
        conic-gradient(from 124deg at 52% 52%, transparent 0deg, rgba(56, 177, 255, 0.34) 58deg, rgba(112, 80, 255, 0.28) 126deg, rgba(246, 66, 190, 0.18) 178deg, transparent 220deg, rgba(238, 35, 96, 0.32) 278deg, transparent 336deg);
      filter: blur(48px) saturate(1.38);
      mix-blend-mode: screen;
      opacity: 0.66;
      animation: breatheColor 5.4s ease-in-out infinite, driftSlow 9.5s ease-in-out infinite alternate;
    }

    .scene::after {
      z-index: -1;
      background:
        linear-gradient(96deg, transparent 10%, rgba(48, 148, 255, 0.2) 26%, rgba(0, 219, 255, 0.1) 38%, transparent 52%),
        linear-gradient(236deg, transparent 14%, rgba(153, 81, 255, 0.2) 39%, rgba(247, 59, 185, 0.09) 52%, transparent 68%),
        linear-gradient(26deg, transparent 26%, rgba(255, 61, 88, 0.14) 48%, transparent 68%),
        radial-gradient(ellipse at 48% 50%, rgba(255, 255, 255, 0.065), transparent 34%),
        radial-gradient(ellipse at 50% 92%, rgba(215, 31, 82, 0.15), transparent 42%);
      filter: blur(34px);
      mix-blend-mode: screen;
      opacity: 0.46;
      animation: breatheVeil 5s ease-in-out infinite, veilShift 8.5s ease-in-out infinite alternate;
    }

    .depth {
      position: absolute;
      inset: 0;
      z-index: 5;
      background:
        radial-gradient(ellipse at 50% 44%, transparent 0 28%, rgba(1, 4, 11, 0.22) 62%, rgba(0, 0, 0, 0.72) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(0, 0, 0, 0.42));
      pointer-events: none;
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 4;
      opacity: 0.12;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(ellipse at 50% 50%, #000 0 40%, transparent 78%);
      animation: gridFloat 18s linear infinite;
    }

    .breath {
      position: absolute;
      z-index: 1;
      left: 50%;
      top: 52%;
      width: min(82vw, 82vh, 760px);
      aspect-ratio: 1;
      translate: -50% -50%;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(126, 218, 255, 0.16) 0%, rgba(98, 73, 255, 0.12) 34%, rgba(255, 49, 112, 0.08) 48%, transparent 68%);
      filter: blur(18px);
      mix-blend-mode: screen;
      opacity: 0.7;
      animation: centerBreath 5.6s ease-in-out infinite;
      pointer-events: none;
    }

    .cursor-aurora {
      position: absolute;
      left: var(--pointer-x);
      top: var(--pointer-y);
      z-index: 3;
      width: min(48vw, 48vh, 520px);
      aspect-ratio: 1;
      translate: -50% -50%;
      border-radius: 50%;
      opacity: var(--pointer-alpha);
      pointer-events: none;
      mix-blend-mode: screen;
      filter: blur(28px) saturate(1.55);
      background:
        radial-gradient(circle at 44% 44%, rgba(202, 255, 219, 0.95) 0%, rgba(98, 255, 154, 0.52) 16%, rgba(34, 235, 130, 0.24) 34%, transparent 62%),
        conic-gradient(from 110deg, transparent 0deg, rgba(36, 255, 151, 0.64) 58deg, rgba(126, 255, 181, 0.24) 118deg, transparent 180deg, rgba(6, 205, 124, 0.46) 246deg, transparent 330deg);
      transform: scale(0.86) rotate(0deg);
      transition: opacity 260ms ease;
      animation: greenPulse 3.6s ease-in-out infinite, greenTurn 8s linear infinite;
      will-change: left, top, opacity, transform;
    }

    .cursor-aurora::before,
    .cursor-aurora::after {
      content: "";
      position: absolute;
      inset: -24%;
      border-radius: inherit;
      pointer-events: none;
    }

    .cursor-aurora::before {
      background:
        linear-gradient(52deg, transparent 14%, rgba(100, 255, 166, 0.5) 34%, transparent 54%),
        linear-gradient(146deg, transparent 24%, rgba(30, 220, 133, 0.48) 46%, transparent 67%),
        radial-gradient(ellipse at 48% 50%, rgba(217, 255, 226, 0.62), transparent 42%);
      filter: blur(20px);
      animation: greenRibbon 4.8s ease-in-out infinite alternate;
    }

    .cursor-aurora::after {
      inset: -8%;
      background:
        radial-gradient(ellipse at 54% 48%, rgba(149, 255, 189, 0.6), transparent 34%),
        radial-gradient(ellipse at 32% 62%, rgba(0, 255, 128, 0.28), transparent 42%);
      filter: blur(46px);
      opacity: 0.78;
      animation: greenAfterglow 5.2s ease-in-out infinite;
    }

    @keyframes breatheColor {
      0%,
      100% {
        opacity: 0.38;
        filter: blur(64px) saturate(1.04);
      }

      48% {
        opacity: 0.92;
        filter: blur(42px) saturate(1.42);
      }
    }

    @keyframes breatheVeil {
      0%,
      100% {
        opacity: 0.28;
      }

      52% {
        opacity: 0.72;
      }
    }

    @keyframes centerBreath {
      0%,
      100% {
        transform: scale(0.82);
        opacity: 0.28;
        filter: blur(30px);
      }

      50% {
        transform: scale(1.18);
        opacity: 0.78;
        filter: blur(16px);
      }
    }

    @keyframes greenPulse {
      0%,
      100% {
        transform: scale(0.72) rotate(-5deg);
        filter: blur(34px) saturate(1.25);
      }

      48% {
        transform: scale(1.1) rotate(8deg);
        filter: blur(22px) saturate(1.9);
      }
    }

    @keyframes greenTurn {
      to {
        rotate: 360deg;
      }
    }

    @keyframes greenRibbon {
      0% {
        transform: translate3d(-8%, 6%, 0) rotate(-10deg) scale(0.92);
        opacity: 0.5;
      }

      100% {
        transform: translate3d(7%, -5%, 0) rotate(13deg) scale(1.08);
        opacity: 0.9;
      }
    }

    @keyframes greenAfterglow {
      0%,
      100% {
        transform: scale(0.82);
        opacity: 0.42;
      }

      50% {
        transform: scale(1.16);
        opacity: 0.86;
      }
    }

    @keyframes driftSlow {
      0% {
        transform: translate3d(-4%, -2%, 0) rotate(0deg) scale(1);
      }

      100% {
        transform: translate3d(3%, 3%, 0) rotate(9deg) scale(1.1);
      }
    }

    @keyframes veilShift {
      0% {
        transform: translate3d(3%, -2%, 0) rotate(-4deg) scale(1.02);
      }

      100% {
        transform: translate3d(-3%, 2%, 0) rotate(5deg) scale(1.08);
      }
    }

    @keyframes gridFloat {
      to {
        transform: translate3d(72px, 72px, 0);
      }
    }

    @media (max-width: 720px) {
      .scene::before {
        filter: blur(40px) saturate(1.34);
      }

      .breath {
        width: min(96vw, 72vh);
      }

      .cursor-aurora {
        width: min(78vw, 46vh);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="深色呼吸光晕背景">
    <div class="breath" aria-hidden="true"></div>
    <div class="cursor-aurora" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <div class="depth" aria-hidden="true"></div>
  </main>

  <script>
    const scene = document.querySelector(".scene");
    const pointer = {
      targetX: window.innerWidth / 2,
      targetY: window.innerHeight / 2,
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      alpha: 0,
      targetAlpha: 0
    };

    function setPointerTarget(event) {
      const point = event.touches ? event.touches[0] : event;
      pointer.targetX = point.clientX;
      pointer.targetY = point.clientY;
      pointer.targetAlpha = 1;
    }

    function hidePointer() {
      pointer.targetAlpha = 0;
    }

    function animatePointer() {
      pointer.x += (pointer.targetX - pointer.x) * 0.14;
      pointer.y += (pointer.targetY - pointer.y) * 0.14;
      pointer.alpha += (pointer.targetAlpha - pointer.alpha) * 0.12;

      scene.style.setProperty("--pointer-x", `${pointer.x}px`);
      scene.style.setProperty("--pointer-y", `${pointer.y}px`);
      scene.style.setProperty("--pointer-alpha", pointer.alpha.toFixed(3));

      requestAnimationFrame(animatePointer);
    }

    scene.addEventListener("pointermove", setPointerTarget);
    scene.addEventListener("pointerenter", setPointerTarget);
    scene.addEventListener("pointerleave", hidePointer);
    scene.addEventListener("touchstart", setPointerTarget, { passive: true });
    scene.addEventListener("touchmove", setPointerTarget, { passive: true });
    scene.addEventListener("touchend", hidePointer);

    window.addEventListener("resize", () => {
      pointer.targetX = Math.min(pointer.targetX, window.innerWidth);
      pointer.targetY = Math.min(pointer.targetY, window.innerHeight);
    });

    animatePointer();
  </script>
</body>
</html>
